<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Carbum MAP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css?v=2">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>

.map-page{
max-width:900px;
margin:0 auto;
padding:16px;
}

.map-title{
font-size:22px;
font-weight:700;
margin-bottom:12px;
}

.map-desc{
font-size:14px;
color:#666;
margin-bottom:14px;
}

#map{
width:100%;
height:70vh;
min-height:420px;
border-radius:14px;
overflow:hidden;
border:1px solid #ddd;
background:#f7f7f7;
}

.map-popup{
width:170px;
}

.map-popup img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:8px;
}

.map-popup a{
font-size:13px;
font-weight:700;
text-decoration:none;
}

.map-empty{
margin-top:14px;
font-size:14px;
color:#777;
}

.user-map-icon{
border-radius:50%;
border:2px solid white;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

</style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

</head>
<body>

{% include "_nav.html" %}

<div class="map-page">

<div class="map-title">Carbum MAP</div>
<div class="map-desc">24時間以内の位置つき投稿を表示しています</div>

<div id="map"></div>

<div id="map-empty"
class="map-empty"
style="display:none;">
まだMAP投稿がありません
</div>

</div>

<script>

//////////////////////////////////////////////////
// MAP 初期設定
//////////////////////////////////////////////////

const normalMap = L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
})

const satelliteMap = L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
{
attribution:"Tiles © Esri"
})

const map = L.map("map",{
center:[43.77,142.36],
zoom:12,
layers:[satelliteMap] // デフォルト航空写真
})

//////////////////////////////////////////////////
// 地図切替
//////////////////////////////////////////////////

const baseMaps = {
"航空写真": satelliteMap,
"地図": normalMap
}

L.control.layers(baseMaps).addTo(map)

//////////////////////////////////////////////////
// マーカークラスタ
//////////////////////////////////////////////////

const markers = L.markerClusterGroup()

//////////////////////////////////////////////////
// 投稿取得
//////////////////////////////////////////////////

fetch("/api/map_posts")

.then(res=>res.json())

.then(data=>{

if(!data || data.length===0){

document.getElementById("map-empty").style.display="block"
return

}

const bounds=[]

data.forEach(p=>{

if(!p.lat || !p.lng) return

bounds.push([p.lat,p.lng])

//////////////////////////////////////////////////
// ユーザーアイコン
//////////////////////////////////////////////////

const icon = L.icon({

iconUrl: p.user_icon ? p.user_icon : "/static/user.png",

iconSize:[42,42],

iconAnchor:[21,21],

popupAnchor:[0,-20],

className:"user-map-icon"

})

//////////////////////////////////////////////////
// ポップアップ
//////////////////////////////////////////////////

const popup = `
<div class="map-popup">
<img src="${p.image}">
<a href="/post/${p.id}">投稿を見る</a>
</div>
`

//////////////////////////////////////////////////
// マーカー
//////////////////////////////////////////////////

const marker = L.marker([p.lat,p.lng],{icon:icon})

marker.bindPopup(popup)

markers.addLayer(marker)

})

//////////////////////////////////////////////////
// MAP追加
//////////////////////////////////////////////////

map.addLayer(markers)

//////////////////////////////////////////////////
// 自動ズーム
//////////////////////////////////////////////////

if(bounds.length>0){

map.fitBounds(bounds,{padding:[30,30]})

}

})

.catch(err=>{

console.log(err)

document.getElementById("map-empty").style.display="block"

document.getElementById("map-empty").textContent="MAP読み込み失敗"

})

</script>

</body>
</html>
