<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロフィール編集 | Carbum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css?v=9003">
</head>
<body>

{% include "_nav.html" %}

<main class="container">

  <a href="/user/{{ me_handle if me_handle else user }}" class="back-link">
    ← プロフィールに戻る
  </a>

  <h2 class="page-title">プロフィール編集</h2>

  <form action="/profile/edit" method="post" enctype="multipart/form-data" class="profile-edit-form">

    <!-- アイコン -->
    <label>プロフィール画像</label>

    <div style="margin-bottom:12px;">
      {% if profile.icon %}
        <img src="{{ profile.icon }}"
             alt="profile icon"
             style="width:88px;height:88px;border-radius:50%;object-fit:cover;border:1px solid #ddd;">
      {% else %}
        <div style="width:88px;height:88px;border-radius:50%;background:#eee;"></div>
      {% endif %}
    </div>

    <input type="file" name="icon" accept="image/*">

    <!-- 表示名 -->
    <label>表示名</label>
    <input type="text"
           name="display_name"
           value="{{ display_name if display_name else '' }}"
           placeholder="例：ちりつも">

    <!-- ハンドル -->
    <label>ハンドル</label>
    <input type="text"
           name="handle"
           value="{{ handle if handle else '' }}"
           placeholder="例：chiritsumo">

    <!-- 地域 -->
    <label>地域</label>
    <input type="text"
           name="region"
           value="{{ profile.region if profile.region else '' }}"
           placeholder="例：北海道・旭川">

    <!-- 自己紹介 -->
    <label>自己紹介</label>
    <textarea name="bio" placeholder="愛車やカスタム内容を書こう">{{ profile.bio if profile.bio else '' }}</textarea>

    <button type="submit" class="primary-btn">保存</button>

  </form>

</main>

</body>
</html>
