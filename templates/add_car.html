<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>愛車追加 | Carbum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css?v=FINAL_UI_2">
</head>
<body>

{% include "_nav.html" %}

<main class="container">

  <a href="/user/{{ me_handle }}" class="back-link">
    ← プロフィールに戻る
  </a>

  <h2 class="page-title">愛車を追加</h2>

  <!-- タブ -->
  <div class="tabs">
    <button onclick="loadMakers('japan_car', this)" class="active">🇯🇵 国産</button>
    <button onclick="loadMakers('foreign_car', this)">🌍 外車</button>
    <button onclick="loadMakers('bike', this)">🏍 バイク</button>
  </div>

  <form action="/profile/cars/add" method="post" class="form-box">

    <!-- メーカー -->
    <label>メーカー</label>
    <select id="makerSelectAdd" name="maker_id" required>
      <option value="">メーカー選択</option>
    </select>

    <!-- 車種 -->
    <label>車種</label>

    <input type="text" id="carSearch" placeholder="車種を絞り込み（例：S1000・DUKE・R）">

    <small class="help-text">
      ※ 入力すると一覧が絞り込まれます
    </small>

    <select id="carSelectAdd" name="car" required disabled>
      <option value="">車種選択</option>
    </select>

    <!-- メイン -->
    <label class="checkbox">
      <input type="checkbox" name="set_primary" value="1">
      メイン愛車にする
    </label>

    <button type="submit" class="submit-btn">追加</button>

  </form>

</main>

<script>
let currentCategory = "japan_car";

// =====================
// タブ切替
// =====================
function setActiveTab(btn){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// =====================
// メーカー読み込み
// =====================
async function loadMakers(category, btn=null) {
  currentCategory = category;
  if(btn) setActiveTab(btn);

  const makerSelect = document.getElementById("makerSelectAdd");
  const carSelect = document.getElementById("carSelectAdd");

  makerSelect.innerHTML = "<option value=''>メーカー選択</option>";
  carSelect.innerHTML = "<option value=''>車種選択</option>";
  carSelect.disabled = true;

  const res = await fetch(`/api/makers?category=${category}`);
  const makers = await res.json();

  makers.forEach(m=>{
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = m.name;
    makerSelect.appendChild(opt);
  });

  makerSelect.onchange = ()=> loadCars(makerSelect.value);
}

// =====================
// 車種読み込み
// =====================
async function loadCars(makerId){
  const carSelect = document.getElementById("carSelectAdd");

  carSelect.innerHTML = "<option value=''>車種選択</option>";
  carSelect.disabled = true;

  if(!makerId) return;

  const res = await fetch(`/api/cars/by-maker-id/${makerId}?category=${currentCategory}`);
  const data = await res.json();

  let cars = Array.isArray(data) ? data : (data.cars || []);

  cars.forEach(c=>{
    const name = c.name || c;
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    carSelect.appendChild(opt);
  });

  carSelect.disabled = false;
}

// =====================
// 車種検索（改良版）
// =====================
document.getElementById("carSearch").addEventListener("input", ()=>{
  const keyword = document.getElementById("carSearch").value.toLowerCase();
  const options = document.getElementById("carSelectAdd").options;

  for(let i=0;i<options.length;i++){
    const txt = options[i].text.toLowerCase();

    if(i === 0){ // 「車種選択」は常に表示
      options[i].style.display = "";
      continue;
    }

    options[i].style.display = txt.includes(keyword) ? "" : "none";
  }
});

// =====================
// 初期ロード
// =====================
document.addEventListener("DOMContentLoaded", ()=>{
  loadMakers("japan_car", document.querySelector(".tabs button"));
});
</script>

<style>
/* タブ */
.tabs {
  display:flex;
  gap:8px;
  margin-bottom:15px;
}
.tabs button {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#eee;
  cursor:pointer;
  font-weight:bold;
}
.tabs button.active {
  background:#3498db;
  color:white;
}

/* フォーム */
.form-box {
  max-width:420px;
  margin:auto;
}

.form-box select,
.form-box input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* ボタン */
.submit-btn {
  width:100%;
  padding:14px;
  border-radius:20px;
  border:none;
  background:#3498db;
  color:white;
  font-size:16px;
  font-weight:bold;
}

/* チェック */
.checkbox {
  margin-bottom:10px;
}

/* 説明 */
.help-text {
  font-size:12px;
  color:#666;
  margin-top:-6px;
  margin-bottom:10px;
}
</style>

</body>
</html>
