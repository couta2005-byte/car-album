<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロフィール編集 | Carbum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css?v=4000">
</head>
<body>

{% include "_nav.html" %}

<main class="container">

  <a href="/user/{{ me_handle if me_handle else user }}" class="back-link">
    ← プロフィールに戻る
  </a>

  <h2 class="page-title">プロフィール編集</h2>

  <!-- 🚗 愛車追加 -->
  <section style="margin-top:28px;">
    <h3>愛車を追加</h3>

    <form action="/profile/cars/add" method="post" class="profile-edit-form">

      <label>メーカー</label>
      <select id="makerSelectAdd" name="maker_id" required>
        <option value="">メーカー選択</option>
      </select>

      <label>車名</label>
      <select id="carSelectAdd" name="car" required>
        <option value="">車種選択</option>
      </select>

      <label>
        <input type="checkbox" name="set_primary" value="1">
        メイン愛車にする
      </label>

      <button type="submit" class="primary-btn">追加</button>

    </form>
  </section>

</main>

<script>
async function loadMakers() {
  const select = document.getElementById("makerSelectAdd");
  select.innerHTML = "<option value=''>メーカー選択</option>";

  const res = await fetch("/api/makers?category=car");
  const makers = await res.json();

  makers.forEach(m => {
    const option = document.createElement("option");
    option.value = m.id; // ★重要
    option.textContent = m.name;
    select.appendChild(option);
  });
}

async function loadCars(makerId) {
  const select = document.getElementById("carSelectAdd");
  select.innerHTML = "<option value=''>車種選択</option>";

  if (!makerId) return;

  const res = await fetch(`/api/cars/by-maker-id/${makerId}`);
  const cars = await res.json();

  cars.forEach(c => {
    const option = document.createElement("option");
    option.value = c.name;
    option.textContent = c.name;
    select.appendChild(option);
  });
}

document.addEventListener("DOMContentLoaded", async () => {
  const maker = document.getElementById("makerSelectAdd");

  await loadMakers();

  maker.addEventListener("change", () => {
    loadCars(maker.value);
  });
});
</script>

</body>
</html>
