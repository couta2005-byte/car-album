<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロフィール編集 | Carbum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css?v=8000">
</head>
<body>

{% include "_nav.html" %}

<main class="container">

  <a href="/user/{{ me_handle if me_handle else user }}" class="back-link">
    ← プロフィールに戻る
  </a>

  <h2 class="page-title">プロフィール編集</h2>

  <form action="/profile/edit" method="post" class="profile-edit-form">

    <label>表示名</label>
    <input type="text" name="display_name" value="{{ profile.display_name or '' }}">

    <label>地域</label>
    <input type="text" name="location" value="{{ profile.location or '' }}">

    <label>自己紹介</label>
    <textarea name="bio">{{ profile.bio or '' }}</textarea>

    <button type="submit" class="primary-btn">保存</button>

  </form>

</main>

</body>
</html>
