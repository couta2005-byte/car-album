<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{{ title }} | {{ username }}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1 class="title">{{ username }} の{{ title }}</h1>

<div class="follow-list">

{% if users %}
  {% for u in users %}
  <div class="follow-item">

    <a href="/user/{{ u }}" class="follow-left">

      <div class="follow-avatar"></div>

      <div class="follow-info">
        <div class="follow-name">{{ u }}</div>
        <div class="follow-handle">@{{ u }}</div>
      </div>

    </a>

  </div>
  {% endfor %}
{% else %}
  <div class="empty">まだ{{ title }}はいません</div>
{% endif %}

</div>

<div class="back">
  <a href="/user/{{ username }}">← プロフィールへ戻る</a>
</div>

</body>
</html>
