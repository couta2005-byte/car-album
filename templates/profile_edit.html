<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロフィール編集 | Carbum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css?v=6000">
</head>
<body>

{% include "_nav.html" %}

<main class="container">

  <a href="/user/{{ me_handle if me_handle else user }}" class="back-link">
    ← プロフィールに戻る
  </a>

  <h2 class="page-title">プロフィール編集</h2>

  <!-- 🚗🏍 愛車追加 -->
  <section style="margin-top:28px;">
    <h3>愛車を追加</h3>

    <!-- 車 / バイク切替 -->
    <div style="margin-bottom:12px;">
      <button type="button" onclick="loadMakers('japan_car')" class="primary-btn">🚗 車</button>
      <button type="button" onclick="loadMakers('bike')" class="primary-btn">🏍 バイク</button>
    </div>

    <form action="/profile/cars/add" method="post" class="profile-edit-form">

      <label>メーカー</label>
      <select id="makerSelectAdd" name="maker_id" required>
        <option value="">メーカー選択</option>
      </select>

      <label>車名</label>
      <select id="carSelectAdd" name="car" required>
        <option value="">車種選択</option>
      </select>

      <label>
        <input type="checkbox" name="set_primary" value="1">
        メイン愛車にする
      </label>

      <button type="submit" class="primary-btn">追加</button>

    </form>
  </section>

</main>

<script>
// ======================
// 🔥 maker変換マップ（超重要）
// ======================
const makerMap = {
  // 日本車
  "トヨタ": "toyota",
  "日産": "nissan",
  "ホンダ": "honda",
  "マツダ": "mazda",
  "スバル": "subaru",
  "三菱": "mitsubishi",
  "スズキ": "suzuki",
  "ダイハツ": "daihatsu",
  "レクサス": "lexus",
  "いすゞ": "isuzu",
  "日野": "hino",

  // 外車（必要に応じて拡張）
  "BMW": "foreign_bmw",
  "メルセデス・ベンツ": "foreign_mercedes",
  "アウディ": "foreign_audi",
  "フォルクスワーゲン": "foreign_vw",
  "ポルシェ": "foreign_porsche",
  "MINI": "foreign_mini",

  // バイク
  "ヤマハ": "yamaha",
  "カワサキ": "kawasaki",
  "BMW Motorrad": "bmw_bike"
};

// ======================
// 状態
// ======================
let currentCategory = "japan_car";

// ======================
// 🔥 メーカー取得
// ======================
async function loadMakers(category = currentCategory) {
  currentCategory = category;

  const makerSelect = document.getElementById("makerSelectAdd");
  const carSelect = document.getElementById("carSelectAdd");

  makerSelect.innerHTML = "<option value=''>メーカー選択</option>";
  carSelect.innerHTML = "<option value=''>車種選択</option>";

  try {
    const res = await fetch(`/api/makers?category=${category}`);
    const makers = await res.json();

    console.log("makers:", makers);

    makers.forEach((m) => {
      const option = document.createElement("option");

      // 🔥 ここが最重要（IDズレ解決）
      const mapped = makerMap[m.name];
      option.value = mapped || m.id;

      option.textContent = m.name;
      makerSelect.appendChild(option);
    });

  } catch (e) {
    console.error("メーカー取得エラー", e);
  }
}

// ======================
// 🔥 車種取得
// ======================
async function loadCars(makerId) {
  const carSelect = document.getElementById("carSelectAdd");
  carSelect.innerHTML = "<option value=''>車種選択</option>";

  if (!makerId) return;

  try {
    const res = await fetch(`/api/cars/by-maker-id/${makerId}`);
    const cars = await res.json();

    console.log("cars:", cars);

    if (!cars.length) {
      console.warn("車種なし:", makerId);
    }

    cars.forEach((c) => {
      const option = document.createElement("option");
      option.value = c.name;
      option.textContent = c.name;
      carSelect.appendChild(option);
    });

  } catch (e) {
    console.error("車種取得エラー", e);
  }
}

// ======================
// 初期化
// ======================
document.addEventListener("DOMContentLoaded", async () => {
  console.log("JS起動");

  const makerSelect = document.getElementById("makerSelectAdd");
  if (!makerSelect) return;

  await loadMakers("japan_car");

  makerSelect.addEventListener("change", () => {
    loadCars(makerSelect.value);
  });
});
</script>

</body>
</html>
