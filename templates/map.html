<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Carbum MAP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css?v=1">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>

.map-page{
max-width:900px;
margin:0 auto;
padding:16px;
}

.map-title{
font-size:22px;
font-weight:700;
margin-bottom:12px;
}

.map-desc{
font-size:14px;
color:#666;
margin-bottom:14px;
}

#map{
width:100%;
height:70vh;
min-height:420px;
border-radius:14px;
overflow:hidden;
border:1px solid #ddd;
background:#f7f7f7;
}

.map-popup{
width:170px;
}

.map-popup img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:8px;
}

.map-popup a{
font-size:13px;
font-weight:700;
text-decoration:none;
}

.map-empty{
margin-top:14px;
font-size:14px;
color:#777;
}

</style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

</head>
<body>

{% include "_nav.html" %}

<div class="map-page">

<div class="map-title">Carbum MAP</div>
<div class="map-desc">24時間以内の位置つき投稿を表示しています</div>

<div id="map"></div>

<div id="map-empty"
class="map-empty"
style="display:none;">
まだMAP投稿がありません
</div>

</div>

<script>

const map = L.map("map").setView([43.77,142.36],12)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}
).addTo(map)


// ★クラスタ
const markers = L.markerClusterGroup()

fetch("/api/map_posts")

.then(res=>res.json())

.then(data=>{

if(!data || data.length===0){

document.getElementById("map-empty").style.display="block"
return

}

const bounds=[]

data.forEach(p=>{

if(!p.lat || !p.lng) return

bounds.push([p.lat,p.lng])

const popup = `
<div class="map-popup">
<img src="${p.image}">
<a href="/post/${p.id}">投稿を見る</a>
</div>
`

const marker = L.marker([p.lat,p.lng])

marker.bindPopup(popup)

markers.addLayer(marker)

})

map.addLayer(markers)

if(bounds.length>0){

map.fitBounds(bounds,{padding:[30,30]})

}

})

.catch(err=>{

console.log(err)

document.getElementById("map-empty").style.display="block"
document.getElementById("map-empty").textContent="MAP読み込み失敗"

})

</script>

</body>
</html>
